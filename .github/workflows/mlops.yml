name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          AWS_KEY=$(python -c "import json,sys; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_access_key_id'])")
          AWS_SECRET=$(python -c "import json,sys; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_secret_access_key'])")
          echo "AWS_ACCESS_KEY_ID=$AWS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET" >> $GITHUB_ENV

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os, boto3
          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket, "models/latest/model.pkl")
          print(f"Model uploaded to s3://{bucket}/models/latest/model.pkl")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}

      # Bonus 3: upload metrics.json + report.txt as CI artifacts
      - name: Save metrics and report as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: |
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL  (gate >= 0.70 + Bonus 4 rollback)
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Authenticate to AWS
        run: |
          AWS_KEY=$(python -c "import json; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_access_key_id'])")
          AWS_SECRET=$(python -c "import json; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_secret_access_key'])")
          echo "AWS_ACCESS_KEY_ID=$AWS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET" >> $GITHUB_ENV

      - name: Check eval gate with rollback protection
        run: |
          python - <<'EOF'
          import os, json, boto3
          from botocore.exceptions import ClientError

          new_acc = float("${{ needs.train.outputs.accuracy }}")
          bucket  = os.environ.get("CLOUD_BUCKET", "")

          # Bonus 4: compare against last deployed model accuracy
          if bucket:
              try:
                  s3 = boto3.client("s3")
                  obj = s3.get_object(Bucket=bucket, Key="outputs/metrics_deployed.json")
                  prev = json.loads(obj["Body"].read())
                  old_acc = float(prev.get("accuracy", 0.0))
                  print(f"Accuracy deployed : {old_acc:.4f}")
                  print(f"Accuracy moi      : {new_acc:.4f}")
                  if new_acc < old_acc:
                      raise SystemExit(
                          f"ROLLBACK: accuracy moi {new_acc:.4f} thap hon "
                          f"accuracy deployed {old_acc:.4f}. Huy deploy."
                      )
                  print("ROLLBACK CHECK PASSED.")
              except ClientError as e:
                  if e.response["Error"]["Code"] == "NoSuchKey":
                      print("Chua co metrics_deployed.json. Bo qua rollback check.")
                  else:
                      print(f"Canh bao rollback check: {e}")
              except SystemExit:
                  raise

          # Base eval gate
          if new_acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {new_acc:.4f} < 0.70. Huy deploy.")
          print(f"PASSED: accuracy {new_acc:.4f} >= 0.70. Dang trien khai model.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install boto3
        run: pip install boto3

      - name: Download metrics artifact
        uses: actions/download-artifact@v4
        with:
          name: metrics
          path: outputs/

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -sf http://localhost:8000/health && echo "Health check passed." || exit 1

      - name: Authenticate to AWS
        run: |
          AWS_KEY=$(python -c "import json; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_access_key_id'])")
          AWS_SECRET=$(python -c "import json; d=json.loads('${{ secrets.CLOUD_CREDENTIALS }}'); print(d['aws_secret_access_key'])")
          echo "AWS_ACCESS_KEY_ID=$AWS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET" >> $GITHUB_ENV

      # Bonus 4: record deployed metrics as new baseline
      - name: Update deployed metrics on S3
        run: |
          python - <<'EOF'
          import os, boto3
          bucket = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("outputs/metrics.json", bucket, "outputs/metrics_deployed.json")
          print(f"Deployed metrics updated: s3://{bucket}/outputs/metrics_deployed.json")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
